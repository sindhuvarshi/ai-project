<!DOCTYPE html>
<html>
<head>
    <title>AI Marks Predictor</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        /* NAVBAR */
        .navbar {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        /* MAIN CONTAINER */
        .container {
            width: 350px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        h2 {
            color: #333;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 15px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 15px;
            font-size: 18px;
            color: green;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            padding: 15px;
            background: #222;
            color: white;
            position: fixed;
            bottom: 0;
            width: 100%;
            font-size: 14px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    🤖 AI Marks Predictor
</div>

<!-- MAIN CARD -->
<div class="container">
    <h2>Enter Study Hours</h2>

    <form action="/predict" method="post">
        <input type="text" name="hours" placeholder="e.g. 5">
        <button type="submit">Predict Marks</button>
    </form>

    {% if result %}
        <div class="result">
            Predicted Marks: {{ result }}
        </div>
    {% endif %}
</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 AI Project | Built with Flask 🚀
</div>

</body>
</html>
