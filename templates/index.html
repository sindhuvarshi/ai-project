<!DOCTYPE html>
<html>
<head>
    <title>AI Marks Predictor</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background-color: #f2f2f2;
        }
        h2 {
            color: #333;
        }
        input {
            padding: 10px;
            width: 200px;
            margin: 10px;
        }
        button {
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
        }
        h3 {
            color: green;
        }
    </style>
</head>
<body>

    <h2>📊 AI Marks Predictor</h2>

    <form action="/predict" method="post">
        <input type="text" name="hours" placeholder="Enter study hours">
        <br>
        <button type="submit">Predict</button>
    </form>

    {% if result %}
        <h3>Predicted Marks: {{ result }}</h3>
    {% endif %}

</body>
</html>
