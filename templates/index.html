<!DOCTYPE html>
<html>
<head>
    <title>AI Marks Predictor</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
        }

        .container {
            width: 350px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 15px;
            font-size: 18px;
            color: green;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>📊 AI Marks Predictor</h2>

    <form action="/predict" method="post">
        <input type="text" name="hours" placeholder="Enter study hours">
        <button type="submit">Predict</button>
    </form>

    {% if result %}
        <div class="result">
            Predicted Marks: {{ result }}
        </div>
    {% endif %}
</div>

</body>
</html>
